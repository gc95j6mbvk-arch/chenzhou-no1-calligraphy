services:
  - type: web
    name: chenzhou-no1-calligraphy
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SECRET
        generateValue: true
      - key: DATA_DIR
        value: /var/data/data
      - key: UPLOAD_DIR
        value: /var/data/uploads
    disks:
      - name: calligraphy-data
        mountPath: /var/data
        sizeGB: 1
